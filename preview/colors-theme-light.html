<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Solvely.ai Light Theme</title>
  <link rel="stylesheet" href="preview.css">
  <style>
    .theme-frame { padding: 18px; border-radius: var(--svy-radius-xl); background: var(--svy-surface-soft); }
  </style>
</head>
<body class="preview-body">
  <main class="preview-shell">
    <p class="preview-kicker">Light Theme</p>
    <h1 class="preview-title">浅色学习工作台</h1>
    <p class="preview-note">浅色主题把题目、答案、步骤拆成清晰层级，避免营销式大面积渐变。</p>
    <section class="preview-grid theme-frame">
      <article class="solver-card">
        <h2>题目输入</h2>
        <p>已识别：解方程 2x + 7 = 19，并说明每一步。</p>
      </article>
      <article class="solver-card" style="background:var(--svy-primary-soft)">
        <h2>最终答案</h2>
        <p class="svy-mono">x = 6</p>
      </article>
      <article class="solver-card" style="background:var(--svy-secondary-soft)">
        <h2>下一步</h2>
        <p>查看相似练习，或追问为什么要两边同时减 7。</p>
      </article>
    </section>
  </main>
</body>
</html>
