<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Solvely.ai Colors Primary</title>
  <link rel="stylesheet" href="preview.css">
  <style>
    .token-ring { outline: 1px solid var(--svy-border); outline-offset: 3px; }
  </style>
</head>
<body class="preview-body">
  <main class="preview-shell">
    <p class="preview-kicker">Color Tokens</p>
    <h1 class="preview-title">核心色板</h1>
    <p class="preview-note">这些色值来自当前包的推断型 Solvely.ai solver 默认 token；Figma 摘要没有暴露可读色值。</p>
    <section class="preview-grid">
      <article class="preview-panel"><div class="swatch token-ring" style="background:var(--svy-primary)"></div><p class="label">Primary / 解题行动</p><p class="meta">--svy-primary</p></article>
      <article class="preview-panel"><div class="swatch" style="background:var(--svy-secondary)"></div><p class="label">Secondary / 学习强调</p><p class="meta">--svy-secondary</p></article>
      <article class="preview-panel"><div class="swatch" style="background:var(--svy-warning)"></div><p class="label">Warning / 部分置信</p><p class="meta">--svy-warning</p></article>
      <article class="preview-panel"><div class="swatch" style="background:var(--svy-danger)"></div><p class="label">Danger / 输入错误</p><p class="meta">--svy-danger</p></article>
      <article class="preview-panel"><div class="swatch" style="background:var(--svy-surface)"></div><p class="label">Surface / 内容面板</p><p class="meta">--svy-surface</p></article>
      <article class="preview-panel"><div class="swatch" style="background:var(--svy-fg)"></div><p class="label">Foreground / 主文本</p><p class="meta">--svy-fg</p></article>
    </section>
  </main>
</body>
</html>
