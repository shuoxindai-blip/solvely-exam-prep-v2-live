<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Solvely.ai Spacing</title>
  <link rel="stylesheet" href="preview.css">
  <style>
    .bar { height: 18px; border-radius: 999px; background: var(--svy-secondary); }
    .spacing-card { display: grid; gap: 10px; }
  </style>
</head>
<body class="preview-body">
  <main class="preview-shell">
    <p class="preview-kicker">Spacing</p>
    <h1 class="preview-title">间距 token</h1>
    <p class="preview-note">4px 基础栅格支持紧凑的 solver 界面，同时保留可触控操作空间。</p>
    <section class="stack">
      <article class="preview-panel spacing-card"><p class="label">4px / --svy-space-1</p><div class="bar" style="width:4px"></div></article>
      <article class="preview-panel spacing-card"><p class="label">12px / --svy-space-3</p><div class="bar" style="width:12px"></div></article>
      <article class="preview-panel spacing-card"><p class="label">24px / --svy-space-6</p><div class="bar" style="width:24px"></div></article>
      <article class="preview-panel spacing-card"><p class="label">40px / --svy-space-10</p><div class="bar" style="width:40px"></div></article>
      <article class="preview-panel spacing-card"><p class="label">72px / --svy-space-18</p><div class="bar" style="width:72px"></div></article>
    </section>
  </main>
</body>
</html>
