<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Solvely Exam Prep Plan Prototype</title>
  <link rel="stylesheet" href="../../colors_and_type.css">
  <style>
    :root {
      --phone-w: 393px;
      --phone-h: 852px;
      --blue: #1677f2;
      --soft-blue: #e7f2ff;
      --soft-gray: #eef2f5;
      --ink: #111318;
      --muted: #737780;
      --line: #dfe5ea;
      --cream: #f7fbff;
      --ease: cubic-bezier(0.22, 1, 0.36, 1);
      --status-h: 54px;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 32px;
      background:
        radial-gradient(circle at 18% 18%, color-mix(in oklch, var(--svy-secondary) 10%, transparent), transparent 30%),
        radial-gradient(circle at 82% 12%, color-mix(in oklch, var(--svy-primary) 8%, transparent), transparent 28%),
        var(--svy-bg);
    }

    button, input, textarea {
      font: inherit;
    }

    .prototype {
      width: min(100%, 1120px);
      display: grid;
      grid-template-columns: minmax(220px, 280px) var(--phone-w) minmax(260px, 1fr);
      gap: 28px;
      align-items: center;
    }

    .notes {
      display: grid;
      gap: 14px;
      color: var(--svy-muted);
      font-size: 15px;
      line-height: 1.5;
    }

    .notes h1 {
      margin: 0;
      color: var(--svy-fg);
      font: 800 28px/1.08 var(--svy-font-display);
      letter-spacing: -0.03em;
    }

    .notes p {
      margin: 0;
    }

    .country-switcher,
    .study-set-switcher {
      display: grid;
      gap: 10px;
      padding: 14px;
      border: 1px solid var(--svy-border);
      border-radius: 20px;
      background: color-mix(in oklch, var(--svy-surface) 92%, transparent);
      box-shadow: var(--svy-shadow-card);
    }

    .country-switcher label,
    .study-set-switcher label {
      display: grid;
      gap: 6px;
      color: var(--svy-fg);
      font: 800 13px/1.2 var(--svy-font-body);
    }

    .country-switcher select {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--svy-border);
      border-radius: 14px;
      background: var(--svy-surface);
      color: var(--svy-fg);
      padding: 0 12px;
      font: 750 14px/1 var(--svy-font-body);
      outline: none;
      cursor: pointer;
    }

    .country-switcher select:focus {
      border-color: color-mix(in oklch, var(--svy-primary) 52%, var(--svy-border));
      box-shadow: 0 0 0 3px color-mix(in oklch, var(--svy-primary) 12%, transparent);
    }

    .country-switcher small,
    .study-set-switcher small {
      color: var(--svy-muted);
      font: 700 12px/1.35 var(--svy-font-body);
    }

    .experiment-note {
      color: var(--svy-muted);
      font: 700 11px/1.35 var(--svy-font-body);
    }

    .variant-toggle {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      padding: 4px;
      border-radius: 16px;
      background: color-mix(in oklch, var(--svy-bg) 78%, var(--svy-surface));
      border: 1px solid var(--svy-border);
    }

    .variant-toggle button {
      min-height: 36px;
      border: 0;
      border-radius: 12px;
      background: transparent;
      color: var(--svy-muted);
      font: 800 12px/1.15 var(--svy-font-body);
      cursor: pointer;
      transition: background 160ms var(--ease), color 160ms var(--ease), box-shadow 160ms var(--ease);
    }

    .variant-toggle button.active {
      background: var(--svy-surface);
      color: var(--svy-fg);
      box-shadow: 0 8px 18px rgba(35, 47, 70, .08);
    }

    .flow-rail {
      display: grid;
      gap: 10px;
    }

    .rail-step {
      min-height: 44px;
      border: 1px solid var(--svy-border);
      border-radius: 16px;
      background: color-mix(in oklch, var(--svy-surface) 88%, transparent);
      color: var(--svy-muted);
      display: grid;
      grid-template-columns: 26px minmax(0, 1fr);
      gap: 10px;
      align-items: center;
      padding: 10px 12px;
      text-align: left;
      cursor: pointer;
      transition: transform 160ms var(--ease), border-color 160ms var(--ease), background 160ms var(--ease);
    }

    .rail-step:hover {
      transform: translateY(-1px);
    }

    .rail-step.active {
      background: var(--svy-secondary-soft);
      border-color: color-mix(in oklch, var(--svy-secondary) 42%, var(--svy-border));
      color: var(--svy-secondary);
      font-weight: 800;
    }

    .rail-index {
      width: 26px;
      height: 26px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      background: var(--svy-surface);
      font-size: 12px;
      font-weight: 850;
    }

    .phone-shell {
      width: var(--phone-w);
      height: var(--phone-h);
      border-radius: 38px;
      background: #f6f9fc;
      box-shadow: 0 32px 80px color-mix(in oklch, var(--svy-fg) 22%, transparent);
      padding: 0;
      overflow: hidden;
      position: relative;
      outline: 1px solid color-mix(in oklch, white 70%, var(--svy-border));
    }

    .phone {
      height: 100%;
      position: relative;
      overflow: hidden;
      background: #f6f9fc;
      color: var(--ink);
    }

    .phone.loading-screen {
      background: #f6f9fc;
      color: var(--ink);
    }

    .phone.outline-screen {
      background: #f6f8fa;
      color: var(--ink);
    }

    .phone.chromeless {
      background: #f5f6f8;
    }

    .figma-onboarding-frame {
      position: absolute;
      inset: 0;
      background: #f5f6f8;
      overflow: hidden;
    }

    .figma-onboarding-art {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top center;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }

    .figma-onboarding-hotspot,
    .figma-onboarding-back,
    .figma-onboarding-option {
      position: absolute;
      border: 0;
      padding: 0;
      background: transparent;
      cursor: pointer;
    }

    .figma-onboarding-hotspot {
      left: 0;
      right: 0;
      top: 100px;
      bottom: 0;
      z-index: 1;
    }

    .figma-onboarding-back {
      left: 16px;
      top: 52px;
      width: 48px;
      height: 48px;
      z-index: 2;
    }

    .figma-onboarding-option {
      z-index: 2;
    }

    .figma-onboarding-progress {
      position: absolute;
      left: 68px;
      right: 28px;
      top: 64px;
      height: 7px;
      border-radius: 999px;
      background: #dcecff;
      overflow: hidden;
      box-shadow: 0 0 0 5px #f5f6f8;
      z-index: 2;
    }

    .figma-onboarding-progress-fill {
      display: block;
      width: var(--progress, 0%);
      height: 100%;
      border-radius: 999px;
      background: #007aff;
    }

    .native-onboarding {
      position: absolute;
      inset: 0;
      background: #f5f6f8;
      color: #111;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      font-family: "Poppins", var(--svy-font-display);
    }

    .native-onboarding.blue {
      color: #fff;
      background:
        radial-gradient(circle at 50% 104%, rgba(255,255,255,.72) 0%, rgba(255,255,255,.38) 16%, transparent 34%),
        linear-gradient(180deg, #1187ff 0%, #6bbaff 65%, #99d0ff 100%);
    }

    .native-status {
      height: 52px;
      padding: 16px 28px 0;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      font: 700 16px/1 var(--svy-font-body);
      letter-spacing: -.02em;
      flex: 0 0 auto;
    }

    .native-status-signal {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 16px;
    }

    .native-progress-head {
      min-height: 40px;
      padding: 10px 20px 0;
      display: flex;
      align-items: center;
      gap: 14px;
      flex: 0 0 auto;
    }

    .native-back {
      width: 28px;
      height: 28px;
      border: 0;
      background: transparent;
      color: #111;
      padding: 0;
      display: grid;
      place-items: center;
      font: 800 28px/1 "Poppins", var(--svy-font-display);
      cursor: pointer;
    }

    .native-progress-track {
      flex: 1;
      height: 6px;
      border-radius: 999px;
      background: #dcecff;
      overflow: hidden;
    }

    .native-progress-fill {
      display: block;
      width: var(--progress, 0%);
      height: 100%;
      border-radius: 999px;
      background: #007aff;
      transition: width 220ms var(--ease);
    }

    .native-intro-body {
      flex: 1;
      padding: 18px 16px 24px;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .native-intro-title {
      margin: 18px auto 8px;
      max-width: 330px;
      text-align: center;
      font: 800 24px/1.22 "Poppins", var(--svy-font-display);
      letter-spacing: -.035em;
      text-wrap: balance;
    }

    .native-intro-copy {
      margin: 0 auto 28px;
      max-width: 330px;
      text-align: center;
      color: #111;
      font: 500 15px/1.45 var(--svy-font-body);
    }

    .native-options-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      padding: 0 14px;
    }

    .native-user-card {
      min-height: 192px;
      border: 2px solid transparent;
      border-radius: 12px;
      background: #fff;
      padding: 8px 8px 16px;
      display: grid;
      grid-template-rows: 1fr auto;
      gap: 14px;
      color: #111;
      font: 700 15px/1.2 "Poppins", var(--svy-font-display);
      cursor: pointer;
    }

    .native-user-card.selected,
    .native-list-option.selected {
      border-color: #007aff;
      background: #eaf5ff;
    }

    .native-user-art {
      border-radius: 5px;
      background: #e5f6ff;
    }

    .native-user-card span:last-child {
      text-align: center;
    }

    .native-list {
      display: grid;
      gap: 14px;
      padding: 0 0 0;
    }

    .native-list-option {
      min-height: 56px;
      width: 100%;
      border: 2px solid transparent;
      border-radius: 14px;
      background: #fff;
      color: #111;
      padding: 0 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      text-align: left;
      font: 600 16px/1.25 "Poppins", var(--svy-font-display);
      cursor: pointer;
    }

    .native-option-icon {
      width: 28px;
      text-align: center;
      font-size: 22px;
      line-height: 1;
      flex: 0 0 auto;
    }

    .native-onboarding-bottom {
      padding: 12px 28px 32px;
      flex: 0 0 auto;
    }

    .native-continue {
      width: 100%;
      min-height: 54px;
      border: 0;
      border-radius: 999px;
      background: #007aff;
      color: #fff;
      font: 700 18px/1 "Poppins", var(--svy-font-display);
      cursor: pointer;
    }

    .native-continue:disabled {
      background: #ececec;
      color: #c6c9ce;
      cursor: not-allowed;
    }

    .native-hero {
      position: relative;
      flex: 1;
      padding: 18px 0 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
    }

    .native-hero h1 {
      margin: 0 auto 20px;
      max-width: 320px;
      text-align: center;
      font: 800 27px/1.25 "Poppins", var(--svy-font-display);
      letter-spacing: -.04em;
      text-wrap: balance;
    }

    .native-hero-label {
      z-index: 1;
      margin: 2px 0 12px;
      font: 700 15px/1 var(--svy-font-body);
    }

    .native-pill-row {
      width: 118%;
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
      flex: 0 0 auto;
    }

    .native-pill-row span {
      width: 112px;
      height: 36px;
      border-radius: 999px;
      background: rgba(218, 239, 255, .78);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.42);
    }

    .native-login {
      margin-top: 22px;
      text-align: center;
      color: rgba(255,255,255,.92);
      font: 600 16px/1 "Poppins", var(--svy-font-display);
    }

    .status {
      height: var(--status-h);
      padding: 18px 24px 0;
      display: flex;
      align-items: start;
      justify-content: space-between;
      font-weight: 800;
      font-size: 15px;
      letter-spacing: -0.02em;
    }

    .signal {
      display: flex;
      gap: 7px;
      align-items: center;
      color: #111;
    }

    .status-icon {
      display: block;
      object-fit: contain;
      flex: 0 0 auto;
    }

    .status-icon.cellular {
      width: 19.2px;
      height: 12.23px;
    }

    .status-icon.wifi-icon {
      width: 17.14px;
      height: 12.33px;
    }

    .status-icon.battery-icon {
      width: 27.33px;
      height: 13px;
    }

    .loading-screen .signal {
      color: #111;
    }

    .outline-screen .signal {
      color: #111;
    }

    .bars {
      display: flex;
      gap: 1.6px;
      align-items: end;
      width: 19.2px;
      height: 12.23px;
    }

    .bars span {
      width: 3px;
      border-radius: 2px;
      background: currentColor;
    }

    .bars span:nth-child(1) { height: 4.5px; }
    .bars span:nth-child(2) { height: 7px; }
    .bars span:nth-child(3) { height: 9.7px; }
    .bars span:nth-child(4) { height: 12.23px; }

    .wifi {
      width: 17.14px;
      height: 12.33px;
      border: 3px solid currentColor;
      border-left-color: transparent;
      border-right-color: transparent;
      border-bottom: 0;
      border-radius: 14px 14px 0 0;
      transform: scale(.72);
    }

    .battery {
      width: 27.33px;
      height: 13px;
      border: 2px solid currentColor;
      border-radius: 5px;
      position: relative;
    }

    .battery::before {
      content: "";
      position: absolute;
      inset: 2px 5px 2px 2px;
      border-radius: 2px;
      background: currentColor;
    }

    .battery::after {
      content: "";
      position: absolute;
      right: -5px;
      top: 3px;
      width: 3px;
      height: 6px;
      border-radius: 0 2px 2px 0;
      background: currentColor;
    }

    .screen {
      height: calc(100% - var(--status-h));
      overflow-y: auto;
      scrollbar-width: none;
      padding: 0 24px 112px;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
    }

    .screen::-webkit-scrollbar {
      display: none;
    }

    .topbar {
      min-height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .flow-screen .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      padding: 4px 0 8px;
      background: linear-gradient(180deg, rgba(255,255,255,.98) 72%, rgba(255,255,255,0));
      backdrop-filter: blur(10px);
    }

    .phone.has-back .topbar {
      padding-left: 54px;
    }

    .topbar-spacer {
      width: 44px;
      height: 44px;
      flex: 0 0 44px;
    }

    .page-back {
      position: absolute;
      left: 22px;
      top: calc(var(--status-h) + 4px);
      width: 44px;
      height: 44px;
      border: 0;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: #fff;
      color: #111;
      box-shadow: 0 8px 18px rgba(20, 24, 30, .08);
      font: 900 28px/1 var(--svy-font-display);
      cursor: pointer;
      z-index: 48;
      transition: transform 150ms var(--ease), background 150ms var(--ease), box-shadow 150ms var(--ease);
    }

    .phone.has-back:not(.flow-screen):not(.loading-screen):not(.outline-screen) .screen {
      padding-top: 56px;
    }

    .phone.has-back .outline-wrap {
      padding-top: 82px;
    }

    .icon-btn, .pill-btn, .micro-btn {
      border: 0;
      min-height: 44px;
      cursor: pointer;
      transition: transform 150ms var(--ease), background 150ms var(--ease), opacity 150ms var(--ease);
    }

    .icon-btn:active, .pill-btn:active, .micro-btn:active, .choice:active, .material:active, .page-back:active {
      transform: scale(.98);
    }

    .icon-btn:focus-visible, .pill-btn:focus-visible, .micro-btn:focus-visible, .choice:focus-visible, .composer-field:focus-visible, .material:focus-visible, .page-back:focus-visible {
      outline: none;
      box-shadow: 0 0 0 4px color-mix(in oklch, var(--svy-secondary) 22%, transparent);
    }

    .icon-btn {
      width: 44px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: #fff;
      color: #111;
      box-shadow: 0 8px 18px rgba(20, 24, 30, .08);
      font-weight: 900;
    }

    .pill-btn {
      border-radius: 999px;
      padding: 0 18px;
      background: var(--soft-blue);
      color: var(--blue);
      font-weight: 760;
      letter-spacing: -0.01em;
      line-height: 1.05;
      white-space: nowrap;
      flex: 0 0 auto;
    }

    .pill-btn.primary {
      background: var(--blue);
      color: white;
      box-shadow: 0 8px 20px rgba(10, 132, 255, .24);
    }

    .pill-btn.dark {
      background: #050807;
      color: white;
      min-height: 48px;
      padding: 0 24px;
      box-shadow: 0 10px 22px rgba(0, 0, 0, .14);
    }

    .pill-btn.disabled {
      background: #ededed;
      color: #8f949b;
      pointer-events: none;
      box-shadow: none;
      cursor: default;
    }

    .direct-plan-btn {
      border: 1px solid #dce7f2;
      background: #fff;
      color: var(--blue);
      box-shadow: none;
    }

    .direct-plan-btn.disabled {
      border-color: #dde4ec;
      background: #fff;
      color: #9aa5b1;
    }

    .micro-btn {
      min-height: 36px;
      border-radius: 11px;
      padding: 0 13px;
      background: #e7e4dd;
      color: #2a2925;
      border: 1px solid #cac5bb;
      box-shadow: 0 4px 0 #b8b2a8;
      font: 800 11px/1 var(--svy-font-mono);
      letter-spacing: .09em;
      text-transform: uppercase;
    }

    .study-title {
      margin: 6px 0 24px;
      font: 850 32px/1 var(--svy-font-display);
      letter-spacing: -0.045em;
    }

    .hero-card {
      min-height: 236px;
      border-radius: 20px;
      padding: 18px;
      border: 1px solid #dce7f2;
      background:
        radial-gradient(circle at 10% 12%, rgba(200, 246, 232, .95), transparent 34%),
        radial-gradient(circle at 82% 18%, rgba(214, 228, 255, .98), transparent 42%),
        linear-gradient(135deg, #fbfeff, #eef6ff);
      position: relative;
      overflow: hidden;
      display: grid;
      align-content: end;
      text-align: center;
      box-shadow: 0 14px 34px rgba(45, 67, 112, .09);
    }

    .mini-card {
      position: absolute;
      width: 112px;
      min-height: 64px;
      border-radius: 12px;
      background: #fff;
      border: 1px solid rgba(200, 210, 225, .9);
      padding: 10px;
      text-align: left;
      box-shadow: 0 14px 28px rgba(31, 41, 64, .12);
      transform: rotate(var(--rot));
      opacity: .5;
      z-index: 0;
    }

    .mini-card strong {
      display: block;
      color: var(--blue);
      font-size: 12px;
      margin-bottom: 7px;
    }

    .mini-line {
      height: 8px;
      border-radius: 999px;
      margin: 6px 0;
      background: #dfe8ff;
    }

    .mini-card:nth-child(1) { --rot: -8deg; left: 12px; top: 28px; }
    .mini-card:nth-child(2) { --rot: 4deg; left: 126px; top: 18px; }
    .mini-card:nth-child(3) { --rot: 11deg; right: 10px; top: 40px; }

    .hero-card h2 {
      position: relative;
      z-index: 1;
      margin: 0 0 8px;
      font: 850 20px/1.12 var(--svy-font-display);
      letter-spacing: -0.03em;
    }

    .hero-card p {
      position: relative;
      z-index: 1;
      margin: 0 0 14px;
      color: #526070;
      font: 680 13px/1.35 var(--svy-font-body);
    }

    .hero-card .pill-btn {
      position: relative;
      z-index: 2;
    }

    .create-row {
      display: flex;
      gap: 20px;
      overflow: hidden;
      margin: 28px -24px 24px;
      padding: 0 24px;
    }

    .create-item {
      min-width: 76px;
      display: grid;
      place-items: center;
      gap: 8px;
      color: #1c1d20;
      font-size: 13px;
    }

    .create-icon {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: #deebff;
      color: var(--blue);
      font-weight: 900;
      font-size: 23px;
      position: relative;
    }

    .create-icon::before, .create-icon::after {
      content: "";
      position: absolute;
      box-sizing: border-box;
    }

    .icon-mic::before {
      width: 14px;
      height: 22px;
      border: 3px solid currentColor;
      border-radius: 9px;
      top: 12px;
    }

    .icon-mic::after {
      width: 24px;
      height: 14px;
      border: 3px solid currentColor;
      border-top: 0;
      border-radius: 0 0 14px 14px;
      top: 25px;
    }

    .icon-book::before {

    }

      color: #007aff;
      animation: predictionShow 1ms var(--delay) forwards, predictionHide 1ms calc(var(--delay) + 900ms) forwards;
    }

    .prediction-step-status .completed {
      color: #65d435;
      animation: predictionShow 1ms calc(var(--delay) + 900ms) forwards;
    }

    .prediction-indicator {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #fff;

      place-items: center;

    }

      width: 12px;
      height: 12px;
      border-radius: 50%;

      display: grid;
      place-items: center;
      color: #fff;
      font: 900 15px/24px var(--svy-font-body);

      opacity: 0;
      transform: scale(.6);

    @keyframes predictionTitleActive {

    @keyframes predictionTitleDone {

    @keyframes predictionCheckIn {

      from { opacity: 0; transform: translateY(8px) scale(.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes keyboardIn {
      from { transform: translateY(40px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes sheetIn {
      from { transform: translateY(80px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(-2deg); }
      50% { transform: translateY(-8px) rotate(2deg); }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 980px) {
      body {
        padding: 18px;
      }

      .prototype {
        grid-template-columns: 1fr;

    function examDateCalendar(context = "onboarding") {
      const today = new Date(2026, 6, 21);
      const visibleMonth = new Date(today.getFullYear(), today.getMonth() + state.onboardingDateMonthOffset, 1);
      const selected = context === "setup" ? setupExamDateValue() : onboardingExamDateValue();
      const monthLabel = visibleMonth.toLocaleDateString("en-US", { month: "long", year: "numeric" });
      const firstDay = visibleMonth.getDay();
      const daysInMonth = new Date(visibleMonth.getFullYear(), visibleMonth.getMonth() + 1, 0).getDate();
      const prevMonthDays = new Date(visibleMonth.getFullYear(), visibleMonth.getMonth(), 0).getDate();
      const cells = [];
      for (let index = 0; index < 42; index += 1) {
        const dayNumber = index - firstDay + 1;
        let date = new Date(visibleMonth.getFullYear(), visibleMonth.getMonth(), dayNumber);
        let label = dayNumber;
        let muted = false;
        if (dayNumber < 1) {
          label = prevMonthDays + dayNumber;
          muted = true;
        } else if (dayNumber > daysInMonth) {
          label = dayNumber - daysInMonth;
          muted = true;
        }
        const iso = toIsoDate(date);
        const disabled = muted || date < today;
        const classes = [
          "exam-date-day",
          muted || date < today ? "muted" : "",

      if (state.onboardingStage === 0) return Boolean(state.onboardingGoal);
      if (state.onboardingStage === 1) return Boolean(state.topic.trim());
      if (state.onboardingStage === 2) {
        const hasExamDate = state.onboardingDatePicker
          ? Boolean(state.onboardingExamDate)
          : Boolean(state.onboardingExamDate || state.onboardingExamDays);
        return hasExamDate && Boolean(state.onboardingStudyTime);
      }
      return true;
    }

    function selectExamDays(value) {
      if (value === "custom") {

      state.onboardingDatePicker = false;
      state.onboardingExamDate = "";
      state.onboardingExamDays = value;

      state.onboardingExamDate = value;

      state.onboardingDatePicker = false;
      render();
    }

    function changeExamDateMonth(delta) {
      state.onboardingDateMonthOffset = Math.max(0, state.onboardingDateMonthOffset + delta);
      render();
    }

    function continueOnboarding() {
      if (state.onboardingIntroStage < onboardingIntroPages.length) {
        if (!onboardingIntroCanContinue()) return;
        state.onboardingIntroStage += 1;
        render();
        return;
      }

      if (!onboardingCanContinue()) return;
      if (state.onboardingStage === 0 && state.onboardingGoal === "daily") {
        setStep("home");
        return;
      }
      if (state.onboardingDatePicker) {
        state.onboardingDatePicker = false;
        render();
        return;
      }
      if (state.onboardingStage < 4) {
        state.onboardingStage += 1;
        render();
        return;
      }
      setStep("home");
    }

    function toIsoDate(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function daysUntilExam(value) {
      const today = new Date(2026, 6, 21);
      const [year, month, day] = value.split("-").map(Number);
      const examDate = new Date(year, month - 1, day);
      return Math.max(1, Math.round((examDate - today) / 86400000));
    }

    function examDateSummary(value) {
      if (!value) return "Choose your exam date to continue.";
      const [year, month, day] = value.split("-").map(Number);
      const examDate = new Date(year, month - 1, day);
      const label = examDate.toLocaleDateString("en-US", { month: "short", day: "numeric" });
      return `${label} · ${daysUntilExam(value)} days until exam`;
    }

    function selectedExamDateLabel() {
      const value = state.onboardingExamDate || "";
      if (!value) return "";
      const [year, month, day] = value.split("-").map(Number);
      return new Date(year, month - 1, day).toLocaleDateString("en-US", { month: "short", day: "numeric" });
    }

    function onboardingExamDateValue() {
      if (state.onboardingExamDate) return state.onboardingExamDate;
      if (!state.onboardingExamDays) return "";
      const today = new Date(2026, 6, 21);
      const amount = Number.parseInt(state.onboardingExamDays, 10);
      const days = Number.isFinite(amount) && amount > 0 ? amount : 3;
      return toIsoDate(new Date(today.getFullYear(), today.getMonth(), today.getDate() + days));
    }

    function onboardingSelectedExamDate() {
      const value = onboardingExamDateValue();
      if (!value) return "";
      const [year, month, day] = value.split("-").map(Number);
      const label = new Date(year, month - 1, day).toLocaleDateString("en-US", {
        month: "short",
        day: "numeric",
        year: "numeric"
      });
      const daysLeft = daysUntilExam(value);
      return `

          <span>Selected exam date<strong>${escapeHtml(label)}</strong></span>
          <small>${daysLeft} ${daysLeft === 1 ? "day" : "days"} left</small>

    }

      const today = new Date(2026, 6, 21);
      const amount = Number.parseInt(state.onboardingExamDays, 10);
      const days = Number.isFinite(amount) && amount > 0 ? amount : 3;
      return toIsoDate(new Date(today.getFullYear(), today.getMonth(), today.getDate() + days));

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")

    function uniqueShortcuts(items, limit = 10) {
      const seen = new Set();
      return items

        .filter((item) => {

          seen.add(key);
          return true;
        })
        .slice(0, limit);

        "Others": []
      };
      const preferred = gradeRules[grade] || gradeRules["High School"];
      return uniqueShortcuts([
        ...preferred.filter((exam) => exams.includes(exam)),
        ...exams
      ], 6);
    }

    function subjectAreaShortcuts() {
      const subject = state.onboardingSubjectArea || "";
      const exams = countryExamOptions[state.examCountry] || countryExamOptions["United States"];
      const hasExam = (name) => exams.includes(name);
      const countrySpecific = (...items) => items.filter(hasExam);

      if (subject === "Math") {
        return [
          ...countrySpecific("SAT", "ACT", "AP Exams", "GCSE", "A-levels", "STEP", "大学入学共通テスト"),
          ...localizedSubjectsByIndex([4, 5, 6])
        ];
      }

      if (subject === "Business & Economics") {
        return [
          ...countrySpecific("GMAT", "GRE", "CPA", "CPA Canada", "CPA Australia", "ACCA", "TOLC-E", "Bocconi Test", "TAGE MAGE"),
          ...localizedSubjectsByIndex([8, 9, 10])
        ];
      }

      if (subject === "Medicine & Health") {
        return [
          ...countrySpecific("MCAT", "USMLE", "NCLEX", "NCLEX-RN", "UCAT", "UCAT ANZ", "GAMSAT", "IMAT", "TOLC-MED", "의사 국가시험", "医師国家試験"),
          ...localizedSubjectsByIndex([1, 2, 0])
        ];
      }

      if (subject === "Science & Engineering") {
        return [
          ...countrySpecific("AP Exams", "TOLC-I", "TOLC-F", "STEP", "大学入学共通テスト", "情報処理技術者試験"),
          ...localizedSubjectsByIndex([0, 1, 2, 3, 5])
        ];
      }

      if (subject === "Social Science & Humanities") {
        return [
          ...countrySpecific("LSAT", "LNAT", "TSA", "Sciences Po", "Concours Grandes Écoles", "LEET", "司法試験", "SQE"),
          ...localizedSubjectsByIndex([7, 10, 8])
        ];
      }

      if (subject === "Arts & Media") {
        return [
          ...localizedSubjectsByIndex([7, 8]),
          "Arts & Media",
          ...countrySpecific("IELTS", "TOEFL", "PTE Academic")
        ];
      }

      return [
        ...countryExamPriority(),
        ...localizedSubjectsByIndex([0, 1, 2, 4, 5, 6])
      ];
    }

    function selectedExamShortcuts() {
      return uniqueShortcuts([
        ...subjectAreaShortcuts(),
        ...countryExamPriority(),
        ...(localizedSubjectOptions[state.examCountry] || localizedSubjectOptions["United States"])
      ], 10);
    }

    function renderSetup() {
      const canContinue = setupCanContinue();
      shell(`
        <div class="screen plan-input-screen">
          <div class="plan-input-body">
            ${state.setupStage === 0 ? courseExamPage() : ""}
            ${state.setupStage === 1 ? gradePage() : ""}
            ${state.setupStage === 2 ? materialsPage() : ""}
          </div>
        </div>
        ${setupBottomCta(canContinue)}
        ${materialUploadSheet()}
        ${setupExamDateSheet()}
      `, { flow: true });
    }

    function courseExamPage() {
      const shortcuts = selectedExamShortcuts();
      const placeholderExamples = shortcuts.slice(0, 3).join(", ");
      return `
        <p class="plan-input-kicker">Exam Goal</p>
        <h1 class="plan-input-title">What are you preparing for?</h1>
        <p class="plan-input-copy">Enter your course, exam, or subject, or choose a quick pick below. Solvely will use it to create a personalized exam prep plan for you.</p>
        <div class="wizard-input-card course-exam-input">
          <label for="custom-exam-input">Course, Exam, or Subject</label>
          <input id="custom-exam-input" value="${escapeHtml(state.topic)}" oninput="updateTopicInput(this.value)" placeholder="Type here, e.g. ${escapeHtml(placeholderExamples)}">
        </div>
        <section class="course-shortcut-section" aria-label="Common exam and subject shortcuts">
          <p class="course-shortcut-label">Quick picks</p>
          <div class="course-shortcut-grid">
            ${shortcuts.map((shortcut) => `
              <button class="course-shortcut-chip ${state.topic === shortcut ? "selected" : ""}" type="button" onclick="selectTopic(${escapeJsArg(shortcut)})">${escapeHtml(shortcut)}</button>
            `).join("")}
          </div>
        </section>
      `;
    }

    function gradePage() {
      const options = [
        { name: "University / College", sub: "Move faster with advanced review, exam checkpoints, and deeper practice.", icon: "🎓" },
        { name: "High School / AP / IB", sub: "Prioritize exam-style practice, weak-topic repair, and course pacing.", icon: "📚" },
        { name: "Middle School", sub: "Use foundational pacing, clearer examples, and shorter practice blocks.", icon: "✏️" },
        { name: "Graduate School", sub: "Support advanced coursework, research-heavy topics, and graduate exams.", icon: "🎓" },
        { name: "Professional License / Certification", sub: "Focus on certification prep, prerequisite review, and efficient refreshers.", icon: "💼" }
      ];
      return `
        <p class="plan-input-kicker">Grade Level</p>
        <h1 class="plan-input-title">What grade level should this plan fit?</h1>
        <p class="plan-input-copy">This helps Solvely calibrate pacing, examples, vocabulary, and daily workload.</p>
        <div class="wizard-options">
          ${options.map((option) => wizardOption({
            selected: state.background === option.name,
            icon: option.icon,
            title: option.name,
            sub: option.sub,
            action: `selectBackground('${option.name}')`
          })).join("")}
        </div>
        <div class="wizard-input-card">
          <label for="custom-grade-input">Other Grade or Program</label>
          <input id="custom-grade-input" value="${escapeHtml(state.background)}" oninput="updateGradeInput(this.value)" placeholder="e.g. AP senior, college freshman, homeschool">
        </div>
        ${state.background.trim() ? wizardInsight("Level Captured", `Solvely will tune the plan for ${escapeHtml(planBackground())}, then choose explanations and practice difficulty that fit your current stage.`) : ""}
      `;
    }

    function materialsPage() {
      const hasUploadedMaterial = state.uploadedFiles.length > 0;
      return `
        <p class="plan-input-kicker">Study Materials</p>
        <h1 class="plan-input-title">Upload your study materials</h1>
        <p class="plan-input-copy">Solvely uses your files or Solution History to spot coverage gaps and prioritize high-impact exam topics.</p>
        ${planEditCard()}
        ${state.uploadedFiles.length ? "" : materialEntryList()}
        ${materialUploadStatus()}
        <div class="wizard-input-card ${hasUploadedMaterial ? "" : "locked-note-card"}">
          <label for="material-note-input">Optional: Add any study requirements</label>
          <textarea id="material-note-input" rows="2" oninput="updateMaterialQuestion(this.value)" placeholder="${hasUploadedMaterial ? "e.g. Focus on cell division, genetics, and the topics I keep missing on quizzes" : "Upload a file first, then add optional focus areas or requirements."}" ${hasUploadedMaterial ? "" : "disabled"}>${escapeHtml(state.materialQuestion)}</textarea>
        </div>
      `;
    }

    function planEditCard() {
      return `
        <section class="plan-edit-card" aria-label="Edit exam plan details">
          <div class="plan-edit-row">
            <span class="plan-edit-icon" aria-hidden="true">🎯</span>
            <span class="plan-edit-field">
              <label for="upload-topic-input">Course, Exam, or Subject</label>
              <input id="upload-topic-input" value="${escapeHtml(state.topic)}" oninput="updateTopicInput(this.value)" placeholder="e.g. Biology, SAT Math, Organic Chemistry">
            </span>
          </div>
          <div class="plan-edit-row">
            <span class="plan-edit-icon" aria-hidden="true">📅</span>
            <button class="plan-date-trigger" type="button" onclick="openSetupExamDateSheet()" aria-label="Edit exam date">
              <span>Exam Date</span>
              <strong>${escapeHtml(setupExamDateValue())}</strong>
            </button>
            <span class="plan-date-chevron" aria-hidden="true">›</span>
          </div>
        </section>
      `;
    }

    function materialEntryList() {
      return `
        <div class="material-entry-list">
          <button class="material-entry-card ${state.materials.has("Upload Photos/Files") ? "selected" : ""}" type="button" onclick="selectMaterial('Upload Photos/Files')">
            <span class="material-entry-icon" aria-hidden="true">📎</span>
            <span class="material-entry-copy">
              <strong>Upload Photos/Files</strong>
              <small>Add files, photos, or solved Solvely questions to help target your exam prep plan.</small>
            </span>
          </button>
        </div>
      `;
    }

    function wizardOption({ selected, icon, title, sub, action }) {
      return `
        <button class="wizard-option ${selected ? "selected" : ""}" type="button" onclick="${action}" aria-pressed="${selected ? "true" : "false"}">
          <span class="wizard-option-icon">${escapeHtml(icon)}</span>
          <span><strong>${escapeHtml(title)}</strong><small>${escapeHtml(sub)}</small></span>
        </button>
      `;
    }

    function wizardInsight(title, copy) {
      return `
        <section class="wizard-insight">
          <span class="wizard-insight-icon">AI</span>
          <span><strong>${escapeHtml(title)}</strong><p>${copy}</p></span>
        </section>
      `;
    }

    function setupBottomCta(canContinue) {
      const isMaterialStep = state.setupStage === 2;
      return `
        <div class="wizard-bottom-cta">
          <button class="block-btn blue" type="button" onclick="continueSetup()" ${canContinue ? "" : "disabled aria-disabled=\"true\""}>${isMaterialStep ? "Generate Exam Prep" : "Continue"}</button>
        </div>
      `;
    }

    function setupCanContinue() {
      if (state.setupStage === 0) return Boolean(state.topic.trim());
      if (state.setupStage === 1) return Boolean(state.background.trim());
      return state.uploadedFiles.length > 0;
    }

    function continueSetup() {
      if (!setupCanContinue()) return;
      if (state.setupStage !== 2) {
        state.setupStage = nextVisibleSetupStage();
        state.setupThinking = "";
        render();
        return;
      }
      state.purpose = `Prepare for ${planTopic()}`;
      state.goals = [state.purpose];
      startPlanReview();
    }

    function backSetupStep() {
      if (state.setupStage > 0) {
        state.setupStage = previousVisibleSetupStage();
        state.setupThinking = "";
        render();
      }
    }

    function nextVisibleSetupStage() {
      const current = visibleSetupStages.indexOf(state.setupStage);
      return visibleSetupStages[Math.min(visibleSetupStages.length - 1, current + 1)] ?? 2;
    }

    function previousVisibleSetupStage() {
      const current = visibleSetupStages.indexOf(state.setupStage);
      return visibleSetupStages[Math.max(0, current - 1)] ?? 0;
    }

    function topicTurn() {
      return `
        <section class="chat-turn">
          <p class="chat-question">What course, exam, or topic are you preparing for?</p>
          ${state.topic.trim()
            ? `<div class="chat-answer">${state.topic.trim()}</div>`
            : `<label class="input-slab" style="margin-bottom:2px">
                <input value="${state.topic}" oninput="state.topic=this.value" onkeydown="if(event.key==='Enter' && this.value.trim()) selectTopic(this.value)" aria-label="Course, exam, or topic" placeholder="Enter a course, exam, or topic">
              </label>
              <div class="chat-actions">
                ${["Inverse Functions", "Precalculus", "Function transformations", "Composite functions", "Math exam", "SAT Math"].map((chip) => `
                  <button class="chat-option" type="button" onclick="selectTopic('${chip}')">${chip}</button>
                `).join("")}
              </div>`}
        </section>
      `;
    }

    function levelTurn() {
      const options = ["Learning function notation", "Practicing inverse function basics", "Working on domain and range restrictions", "Reviewing precalculus inverse functions"];
      return `
        <section class="chat-turn">
          <p class="chat-question">To help you prepare effectively, what specific level of ${planTopic().toLowerCase()} will your exam cover?</p>
          ${state.background
            ? `<div class="chat-answer compact">${state.background}</div>`
            : state.setupThinking
              ? ""
              : `<div class="chat-actions">
                  ${options.map((choice) => `<button class="chat-option" type="button" onclick="selectBackground('${choice}')">${choice}</button>`).join("")}
                </div>`}
        </section>
      `;
    }

    function goalTurn() {
      const options = ["Finding inverse equations", "Understanding domain and range", "Verifying inverse pairs", "Preparing for a functions exam"];
      return `
        <section class="chat-turn">
          <p class="chat-question">To tailor your practice, how do you plan to use these skills for your upcoming exam?</p>
          ${state.setupStage >= 3 && state.goals.length
            ? `<div class="chat-answer compact">${state.goals.map((goal) => `- ${goal}`).join("\n")}</div>`
            : state.setupThinking
              ? ""
              : `<div class="chat-actions">
                  ${options.map((choice) => `<button class="chat-option ${state.goals.includes(choice) ? "selected" : ""}" type="button" onclick="toggleGoal('${choice}')">${state.goals.includes(choice) ? "✓ " : ""}${choice}</button>`).join("")}
                </div>
                <button class="add-more-btn" type="button" onclick="submitGoals()" ${state.goals.length ? "" : "disabled"}>Continue</button>`}
        </section>
      `;
    }

    function materialTurn() {
      const hasMaterial = state.uploadedFiles.length > 0 || state.materialQuestion.trim();
      return `
        <section class="chat-turn">
          <p class="chat-question">Upload study material or type questions Solvely should review before drafting your plan.</p>
          ${hasMaterial ? `<div class="chat-answer compact">${uploadedMaterialSummary()}</div>` : ""}
          ${hasMaterial ? "" : `<div class="materials">
            <label class="material question-material">
              <span>Q</span>
              <span><strong>Your questions</strong><input class="material-question-input" value="${state.materialQuestion}" oninput="updateMaterialQuestion(this.value)" aria-label="Your questions" placeholder="Type your question..."></span>
              <span class="plus edit-dot">+</span>
            </label>
            ${materialOptions.map(({ name, sub, icon }) => `
              <button class="material ${state.materials.has(name) ? "added" : ""}" type="button" onclick="selectMaterial('${name}')">
                <span>${icon}</span>
                <span>${name}<small>${state.materials.has(name) ? "Added as a source for review" : sub}</small></span>
                <span class="plus">${state.materials.has(name) ? "✓" : "+"}</span>
              </button>
            `).join("")}
          </div>`}
          ${materialUploadStatus()}
        </section>
      `;
    }

    function thinkingRow() {
      return `<div class="thinking-row"><span class="thinking-mark"></span><span>Solvely is thinking...</span></div>`;
    }

    function setupReviewCard() {
      return `
        <section class="chat-turn">
          <p class="chat-question">I have everything I need to build your custom ${planTopic().toLowerCase()} prep plan.</p>
          <div class="setup-summary-card">
            <h2>Here's what Solvely understood:</h2>
            ${summaryField("Plan name", `${planTopic()} Prep Plan`)}
            ${summaryField("Learning goal", planPurpose())}
            ${summaryField("Starting point", state.background)}
            ${summaryField("Reviewed material", uploadedMaterialSummary())}
            <button class="block-btn blue" type="button" onclick="startPlanReview()">Create Exam Prep Plan</button>
          </div>
        </section>
      `;
    }

    function summaryField(label, value) {
      return `<div class="summary-field"><label>${label}</label><div>${value}</div></div>`;
    }

    function entryComposer(extraClass = "") {
      return `
        <div class="entry-composer ${extraClass}">
          <label class="entry-input-shell">
            <input value="${state.topic}" oninput="state.topic=this.value" onkeydown="if(event.key==='Enter' && this.value.trim()) startSetupFromEntry(this.value)" aria-label="What are you preparing for?" placeholder="I'm preparing for...">
            <button class="entry-mic-btn" type="button" aria-label="Voice input">
              <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path d="M12 3.5c-2.12 0-3.84 1.72-3.84 3.84v4.22c0 2.12 1.72 3.84 3.84 3.84s3.84-1.72 3.84-3.84V7.34c0-2.12-1.72-3.84-3.84-3.84Z" fill="none" stroke="currentColor" stroke-width="2.2"/>
                <path d="M5.55 10.4v1.22A6.45 6.45 0 0 0 12 18.07a6.45 6.45 0 0 0 6.45-6.45V10.4M12 18.07v2.43M8.8 20.5h6.4" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
              </svg>
            </button>
          </label>
          <span class="entry-home-indicator"></span>
        </div>
      `;
    }

    function backgroundQuestion() {
      return `
        <section class="setup-section reveal">
          <div class="setup-label"><span>2</span> Current level</div>
          <p class="setup-question">Where are you starting from with ${planTopic().toLowerCase()}?</p>
          <div class="choices compact">
            ${["Reviewing precalculus functions", "Comfortable with function notation", "Need help with domain restrictions", "Preparing for a functions unit test"].map((choice) => `
              <button class="choice ${choice === selectedBackground() ? "picked" : ""}" type="button" onclick="selectBackground('${choice}')">
                <span class="check">${choice === selectedBackground() ? "✓" : ""}</span>${choice}
              </button>
            `).join("")}
          </div>
        </section>
      `;
    }

    function goalQuestion() {
      return `
        <section class="setup-section reveal">
          <div class="setup-label"><span>3</span> What should the plan help with?</div>
          <p class="setup-question">Pick the outcome Solvely should optimize the outline around.</p>
          <div class="choices compact">
            ${["To prepare for an upcoming exam", "To solve complex word problems", "To get ahead for Pre-Calculus", "To help with physics or science homework"].map((choice) => `
              <button class="choice ${choice === selectedPurpose() ? "picked" : ""}" type="button" onclick="selectPurpose('${choice}')">
                <span class="check">${choice === selectedPurpose() ? "✓" : ""}</span>${choice}
              </button>
            `).join("")}
          </div>
        </section>
      `;
    }

    function materialsQuestion() {
      return `
        <section class="setup-section reveal material-section">
          <div class="setup-label"><span>4</span> Study material</div>
          <p class="setup-question">Upload a source or type questions Solvely should review before drafting your outline.</p>
          ${state.uploadedFiles.length ? "" : `<div class="materials">
            <label class="material question-material">
              <span>Q</span>
              <span><strong>Your questions</strong><input class="material-question-input" value="${state.materialQuestion}" oninput="updateMaterialQuestion(this.value)" aria-label="Your questions" placeholder="Type your question..."></span>
              <span class="plus edit-dot">+</span>
            </label>
            ${materialOptions.map(({ name, sub, icon }) => `
              <button class="material ${state.materials.has(name) ? "added" : ""}" type="button" onclick="selectMaterial('${name}')">
                <span>${icon}</span>
                <span>${name}<small>${state.materials.has(name) ? "Added as a source for review" : sub}</small></span>
                <span class="plus">${state.materials.has(name) ? "✓" : "+"}</span>
              </button>
            `).join("")}
          </div>`}
          ${materialUploadStatus()}
        </section>
      `;
    }

    function materialUploadStatus() {
      if (!state.uploadingFile && state.uploadedFiles.length === 0) return "";
      return `
        <div class="upload-stack">
          ${state.uploadingFile ? uploadFileRow(state.uploadingFile, true) : ""}
          ${state.uploadedFiles.map((file) => uploadFileRow(file, false)).join("")}
          ${state.uploadedFiles.length ? `<button class="add-more-btn" type="button" onclick="openAdditionalMaterialSheet()">+ Add more</button>` : ""}
        </div>
      `;
    }

    function uploadFileRow(file, loading) {
      return `
        <div class="upload-file">
          <span class="file-icon">${file.icon}</span>
          <span><strong>${file.file}</strong><small>${loading ? "Uploading to Solvely..." : `${file.name} · Ready for review`}</small></span>
          <span class="${loading ? "upload-spinner" : "upload-check"}">${loading ? "" : "✓"}</span>
        </div>
      `;
    }

    function materialUploadSheet() {
      if (!state.uploadSheet) return "";
      const material = state.uploadSheet;
      const isAdditional = material.name === "Additional Material";
      const isUploadFiles = material.name === "Upload Photos/Files";
      const sheetTitle = isAdditional ? "Add more study material" : isUploadFiles ? "Upload photos/files" : `Add ${material.name.toLowerCase()}`;
      const sheetCopy = isAdditional
        ? "Upload another input so Solvely can make your exam prep plan more targeted."
        : isUploadFiles
          ? "Upload photos, notes, textbooks, practice exams, or outlines so Solvely can check coverage before building your plan."
          : "Choose a source. Solvely will read it before drafting your outline.";
      return `
        <div class="sheet-backdrop" onclick="closeMaterialSheet()">
          <section class="upload-sheet" onclick="event.stopPropagation()" role="dialog" aria-label="${isUploadFiles ? "Upload study material" : `Upload ${material.name}`}">
            <button class="sheet-close" type="button" onclick="closeMaterialSheet()" aria-label="Close upload options">×</button>
            <div class="sheet-handle"></div>
            <h2>${sheetTitle}</h2>
            <p>${sheetCopy}</p>
            <div class="sheet-options">
              ${uploadSheetOptions(material).map((option) => `
                <button class="sheet-option" type="button" onclick="${option.action || `startMaterialUpload('${material.name}', '${option.label}')`}">
                  <span>${option.icon}</span>
                  <span><strong>${option.label}</strong><small>${option.sub}</small></span>
                </button>
              `).join("")}
            </div>
          </section>
        </div>
      `;
    }

    function setupExamDateSheet() {
      if (!state.setupExamDateSheet) return "";
      const quickDates = [
        { label: "Tomorrow", value: toIsoDate(new Date(2026, 6, 22)) },
        { label: "In 2 days", value: toIsoDate(new Date(2026, 6, 23)) },
        { label: "In 3 days", value: toIsoDate(new Date(2026, 6, 24)) }
      ];
      const selected = setupExamDateValue();
      return `
        <div class="sheet-backdrop" onclick="closeSetupExamDateSheet()">
          <section class="upload-sheet exam-date-sheet" onclick="event.stopPropagation()" role="dialog" aria-label="Edit exam date">
            <button class="sheet-close" type="button" onclick="closeSetupExamDateSheet()" aria-label="Close exam date picker">×</button>
            <div class="sheet-handle"></div>
            <h2>Edit exam date</h2>
            <p>Choose the test day so Solvely can pace your study plan and mock exams.</p>
            <div class="exam-date-quick-row" aria-label="Quick exam date choices">
              ${quickDates.map((item) => `
                <button class="exam-date-quick ${selected === item.value ? "selected" : ""}" type="button" onclick="selectSetupExamDate('${item.value}')">${item.label}</button>
              `).join("")}
            </div>
            ${examDateCalendar("setup")}
          </section>
        </div>
      `;
    }

    function uploadSheetOptions(material) {
      if (material.name === "Additional Material") {
        return [
          { label: "Files", sub: "Upload PDFs, documents, notes, or exam outlines", icon: "FILE" },
          { label: "Photos", sub: "Add photos of worksheets, textbook pages, or notes", icon: "IMG" },
          { label: "Solution History", sub: "Select solved Solvely questions to guide exam prep", icon: "🕘", action: "openSolutionHistoryFromSheet()" }
        ];
      }
      if (material.name === "Upload Photos/Files") {
        return [
          { label: "Choose Files", sub: "Upload PDFs, documents, notes, or exam outlines", icon: "FILE" },
          { label: "Take Photo", sub: "Capture a worksheet, textbook page, or notes", icon: "CAM" },
          { label: "Solution History", sub: "Select solved Solvely questions to guide exam prep", icon: "🕘", action: "openSolutionHistoryFromSheet()" }
        ];
      }
      if (material.name === "Take photos") {
        return [
          { label: "Photo Library", sub: "Pick an existing worksheet image", icon: "IMG" },
          { label: "Take Photo", sub: "Capture a new page now", icon: "CAM" },
          { label: "Choose Files", sub: "Attach an image or PDF", icon: "FILE" }
        ];
      }
      if (material.name === "Lecture notes") {
        return [
          { label: "Paste Text", sub: "Paste class notes or a transcript", icon: "TXT" },
          { label: "Choose Files", sub: "Attach notes as PDF, DOC, or TXT", icon: "FILE" }
        ];
      }
      return [
        { label: "Choose Files", sub: "Upload PDF, image, or document", icon: "FILE" },
        { label: "Take Photo", sub: "Capture a page with your camera", icon: "CAM" },
        { label: "Paste Text", sub: "Paste copied material", icon: "TXT" }
      ];
    }

    function notesQuestion() {
      return `
        <section class="setup-section reveal">
          <div class="setup-label"><span>5</span> Anything Solvely should account for?</div>
          <p class="setup-question">Add weak spots, test dates, teacher focus areas, or constraints.</p>
          <div class="question-card">
            <label>Focus areas, weak spots, deadline</label>
            <textarea class="question-input" rows="3" oninput="state.question=this.value" aria-label="Plan notes">${state.question}</textarea>
          </div>

      if (source === "Solution History") {

      const isAdditional = name === "Additional Material";
      const material = isAdditional
        ? { name, icon: additionalMaterialIcon(source), file: additionalMaterialFile(source) }
        : materialOptions.find((option) => option.name === name) || materialOptions[0];
      const suffix = state.uploadedFiles.length ? `-${state.uploadedFiles.length + 1}` : "";
      const baseFile = source === "Take Photo" || source === "Photo" || source === "Photos" ? material.file.replace(/\.[^.]+$/, ".jpg") : material.file;
      const file = {
        name: material.name,
        icon: material.icon,
        file: suffix ? baseFile.replace(/(\.[^.]+)$/, `${suffix}$1`) : baseFile
      };
      state.uploadSheet = null;
      state.uploadingFile = file;
      state.lastMaterialName = material.name;
      render();
      scrollSetupToLatest();
      window.setTimeout(() => {
        state.uploadingFile = null;
        state.uploadedFiles.push(file);

                return `

    function outlinePriorityTag(sectionIndex, lessonIndex) {
      const ratings = {
        "0-0": 5,
        "0-1": 4,
        "0-2": 3,
        "1-0": 5,
        "1-1": 4
      };
      const rating = ratings[`${sectionIndex}-${lessonIndex}`] || 3;
      return ["★".repeat(rating), "stars", rating];
    }

    function priorityTag(tag) {
      const [label, type = ""] = tag;
      const rating = tag[2];
      const ariaLabel = type === "stars" ? `AI importance rating: ${rating} out of 5 stars` : label;
      return `<span class="topic-priority-tag ${type}" aria-label="${ariaLabel}">${label}</span>`;
    }

    function studySetPriorityTag(tag, status) {
      const ratingMap = {
        hot: 5,
        focus: 4,
        material: 4
      };
      const rating = tag ? ratingMap[tag[1]] || 3 : (status === "upcoming" ? 3 : 4);
      return priorityTag(["★".repeat(rating), "stars", rating]);
    }

              <div class="solution-prompt-row">
                <span aria-hidden="true">⌘</span>
                <span>Please provide a detailed step-by-step solution to the problem, including all necessary calculations and explanations. Additionally, assist me in plotting a similar curve equation, ensuring to explain the process and any relevant formulas used.</span>
                <span aria-hidden="true">⌄</span>
              </div>
            ` : ""}
          </div>
        </article>
      `;
    }

    function pathItem(index, title, status, badge = "") {
      const description = status === "next"
        ? `Solvely will teach this topic with examples from your uploaded material, then give you a quick practice check.`
        : "";
      const dot = status === "done" ? "✓" : status === "next" ? "◔" : "◷";
      return `
        <article class="path-card ${status === "next" ? "next" : ""}">
          <span class="path-dot ${status}">${dot}</span>
          ${badge ? `<span class="next-badge">${badge}</span>` : ""}
          <h3>${title}</h3>
          ${description ? `<p>${description}</p><button class="learn-btn" type="button">Learn →</button>` : ""}
        </article>
      `;
    }

    function composer(placeholder, action, cream = false) {
      return `
        <form class="composer" onsubmit="event.preventDefault(); ${action}">
          <button class="icon-btn" type="button" aria-label="Upload">↥</button>
          <input class="composer-field" placeholder="${placeholder}" aria-label="${placeholder}">
          <button class="icon-btn" type="submit" aria-label="Voice or send">◉</button>
        </form>
      `;
    }

    function keyboard() {
      const row = (chars) => `<div class="key-row">${chars.map((char) => `<span class="key">${char}</span>`).join("")}</div>`;
      return `
        <div class="keyboard" aria-hidden="true">
          <div class="suggestions"><span>I</span><span>history</span><span>I'm</span></div>
          ${row(["Q","W","E","R","T","Y","U","I","O","P"])}
          ${row(["A","S","D","F","G","H","J","K","L"])}
          <div class="key-row"><span class="key mod">⇧</span>${["Z","X","C","V","B","N","M"].map((char) => `<span class="key">${char}</span>`).join("")}<span class="key mod">⌫</span></div>
          <div class="key-row"><span class="key mod">123</span><span class="key mod">☻</span><span class="key wide"></span><span class="key mod">↵</span></div>
        </div>
      `;
    }

    function render() {
      renderCountrySwitcher();
      renderStudySetSwitcher();
      renderRail();
      if (state.step === "onboarding") renderOnboarding();
      if (state.step === "home") renderHome();
      if (state.step === "setup") renderSetup();
      if (state.step === "solutionHistory") renderSolutionHistorySelector();
      if (state.step === "prepLoading") renderPrepLoading();
      if (state.step === "outline") renderOutline();
      if (state.step === "generating") renderGenerating();
      if (state.step === "result") renderResult(false);
      if (state.step === "map") renderResult(true);
      if (state.step === "course") renderCourse();
    }

    window.setStep = setStep;
    window.startOnboarding = startOnboarding;
    window.setExamCountry = setExamCountry;
    window.setStudySetVariant = setStudySetVariant;
    window.selectOnboardingGoal = selectOnboardingGoal;
    window.selectOnboardingIntroOption = selectOnboardingIntroOption;
    window.selectExamDays = selectExamDays;
    window.selectExamDate = selectExamDate;
    window.changeExamDateMonth = changeExamDateMonth;
    window.selectStudyTime = selectStudyTime;
    window.continueOnboarding = continueOnboarding;
    window.startSetup = startSetup;
    window.startSetupFromEntry = startSetupFromEntry;
    window.goBack = goBack;
    window.toggleMaterial = toggleMaterial;
    window.selectTopic = selectTopic;
    window.updateTopicInput = updateTopicInput;
    window.openSetupExamDateSheet = openSetupExamDateSheet;
    window.closeSetupExamDateSheet = closeSetupExamDateSheet;
    window.selectSetupExamDate = selectSetupExamDate;
    window.selectBackground = selectBackground;
    window.updateGradeInput = updateGradeInput;
    window.selectPurpose = selectPurpose;
    window.toggleGoal = toggleGoal;
    window.submitGoals = submitGoals;
    window.selectComfort = selectComfort;
    window.selectMaterial = selectMaterial;
    window.completeSolutionHistorySelection = completeSolutionHistorySelection;
    window.updateMaterialQuestion = updateMaterialQuestion;
    window.openAdditionalMaterialSheet = openAdditionalMaterialSheet;
    window.openSolutionHistoryFromSheet = openSolutionHistoryFromSheet;
    window.continueSetup = continueSetup;
    window.backSetupStep = backSetupStep;
    window.toggleOutlineLesson = toggleOutlineLesson;
    window.createCourseFromOutline = createCourseFromOutline;
    window.setCourseView = setCourseView;
    window.selectSchemeOneTopic = selectSchemeOneTopic;
    window.openLearnToolSheet = openLearnToolSheet;
    window.closeLearnToolSheet = closeLearnToolSheet;
    window.selectLearnTool = selectLearnTool;
    window.openMonetizationSheet = openMonetizationSheet;
    window.closeMonetizationSheet = closeMonetizationSheet;
    window.state = state;

    render();
  </script>
</body>
</html>
